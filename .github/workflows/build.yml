name: Build APK

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CallShield-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload ${{ github.ref_name }} app/build/outputs/apk/release/*.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-database:
    runs-on: ubuntu-latest
    # Run weekly on Monday at 6am UTC
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update from all sources (FTC + FCC + PhoneBlock + ToastedSpam)
        run: |
          pip install requests
          python scripts/import_all_sources.py --max 500000 --min-reports 2

      - name: Retrain spam ML model weights
        run: python scripts/train_spam_model.py

      - name: Extract spam domains from community reports
        run: python scripts/extract_spam_domains.py

      - name: Generate hot list + campaign ranges
        run: python scripts/generate_hot_list.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update spam database + retrain ML model $(date +%Y-%m-%d)"
          git push
