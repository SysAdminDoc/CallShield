name: Merge Community Reports

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly, Monday 8am UTC (2h after build.yml to avoid push race)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Merge reports into database
        run: python scripts/merge_community_reports.py

      - name: Extract spam domains from SMS reports
        run: python scripts/extract_spam_domains.py

      - name: Generate hot list + campaign ranges
        run: python scripts/generate_hot_list.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update hot list + merge community reports $(date +%Y-%m-%dT%H:%M)"
          git push
